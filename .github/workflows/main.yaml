name: "Main"

on: # yamllint disable-line rule:truthy
  pull_request: null
  push:
    branches:
      - "main"

permissions: {}

jobs:
  tests:
    uses: TYPO3-Documentation/t3docs-ci-deploy/.github/workflows/reusable-php-tests.yml@main
    with:
      php-versions: '["8.2", "8.3", "8.4", "8.5"]'
      test-unit-command: "make test-unit ENV=local"
      test-integration-command: "make test-integration ENV=local"
      php-extensions: "inotify, pcntl"

  quality:
    uses: TYPO3-Documentation/t3docs-ci-deploy/.github/workflows/reusable-php-quality.yml@main
    with:
      php-version: "8.2"
      cs-fixer-command: "make test-cs-fixer ENV=local"
      phpstan-command: "make test-phpstan ENV=local"
      run-xml-lint: true
      xml-lint-command: "make test-xml-lint ENV=local"
      php-extensions: "inotify, pcntl"

  validate-monorepo:
    name: Validate monorepo structure
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install PHP
        uses: shivammathur/setup-php@44454db4f0199b8b9685a5d763dc37cbf79108e1 # v2
        with:
          coverage: none
          php-version: "8.2"
          extensions: "inotify, pcntl"

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@cdf6c1fa76f9e2f51c2b456279dbfd8126e1e9b2 # v5.0.3
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: php-8.2-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: php-8.2-composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Validate monorepo
        run: make test-monorepo
        env:
          RUN_ENVIRONMENT: "local"
