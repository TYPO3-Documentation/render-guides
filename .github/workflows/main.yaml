name: "Main"

on:
  pull_request: null
  push:
    branches:
      - "main"
  # Required for the merge queue on "main": without this trigger, queued
  # merges never receive their required status checks and time out.
  merge_group: null

permissions:
  contents: read

# The job names below ("Tests (8.x)", "Quality", ...) are configured as
# required status checks for the merge queue on "main". Renaming a job or
# changing how its checks are reported requires updating the branch ruleset
# in the same change, or the merge queue will block all merges.
jobs:
  tests:
    uses: TYPO3-Documentation/.github/.github/workflows/reusable-php-tests.yml@main
    with:
      php-versions: '["8.2", "8.3", "8.4", "8.5"]'
      test-unit-command: "make test-unit ENV=local"
      test-integration-command: "make test-integration ENV=local"
      php-extensions: "inotify, pcntl"

  quality:
    uses: TYPO3-Documentation/.github/.github/workflows/reusable-php-quality.yml@main
    with:
      php-version: "8.2"
      cs-fixer-command: "make code-style ENV=local"
      phpstan-command: "make phpstan ENV=local"
      run-xml-lint: true
      xml-lint-command: "make test-xml ENV=local"
      php-extensions: "inotify, pcntl"

  composer-normalize:
    uses: TYPO3-Documentation/.github/.github/workflows/reusable-php-command.yml@main
    with:
      php-version: "8.2"
      command: "composer normalize --dry-run"
      php-extensions: "inotify, pcntl"

  test-docs:
    uses: TYPO3-Documentation/.github/.github/workflows/reusable-php-command.yml@main
    with:
      php-version: "8.2"
      command: "make test-docs ENV=local"
      php-extensions: "inotify, pcntl"

  test-rendertest:
    uses: TYPO3-Documentation/.github/.github/workflows/reusable-php-command.yml@main
    with:
      php-version: "8.2"
      command: "make test-rendertest ENV=local"
      php-extensions: "inotify, pcntl"

  validate-monorepo:
    uses: TYPO3-Documentation/.github/.github/workflows/reusable-php-command.yml@main
    with:
      php-version: "8.2"
      command: "make test-monorepo ENV=local"
      php-extensions: "inotify, pcntl"

  theme-js-tests:
    name: "typo3-docs-theme JS tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/typo3-docs-theme
    steps:
      - name: "Checkout"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: "Install Node"
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: packages/typo3-docs-theme/.nvmrc
          cache: npm
          cache-dependency-path: packages/typo3-docs-theme/package-lock.json

      - name: "Install npm dependencies"
        run: npm ci --no-progress

      - name: "Run JS unit tests"
        run: npm test

